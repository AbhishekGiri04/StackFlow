<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Self Modifying Page</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    transition: all 1s ease;
}

#box {
    padding: 20px;
    display: inline-block;
    border-radius: 10px;
    font-size: 20px;
}
</style>

</head>

<body>

<h2>Self Modifying Web Page</h2>

<div id="box">Initial Content</div>

<script>

function modifyPage() {

    let now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    // Random background color
    let colors = ["lightblue", "lightgreen", "lightpink", "lightyellow", "lightgray"];
    let randomColor = colors[Math.floor(Math.random() * colors.length)];

    document.body.style.background = randomColor;

    // Change content dynamically
    document.getElementById("box").innerHTML =
        "Current Time: " + hours + ":" + minutes + ":" + seconds +
        "<br> Page updated automatically every minute ✔";
}

// Run immediately
modifyPage();

// Update every 60 seconds (60000 ms)
setInterval(modifyPage, 60000);

</script>

</body>
</html>
