<!DOCTYPE html>
<html>
<head>
    <title>Form Example</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #cfd8e6, #e6ecf5);
        }
        .container {
            width: 700px;
            margin: 40px auto;
        }
        fieldset {
            margin-bottom: 20px;
            padding: 20px;
        }
        label {
            display: inline-block;
            width: 130px;
            margin-bottom: 10px;
        }
        input {
            margin-bottom: 10px;
        }
        .buttons {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<form>

    <!-- Basic Information -->
    <fieldset>
        <legend>Basic information</legend>

        <label>Full name:</label>
        <input type="text"><br>

        <label>Birth date:</label>
        <input type="text"><br>

        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Address:</label>
        <input type="text"><br>

        <label>Phone number:</label>
        <input type="text"><br>

    </fieldset>

    <!-- Extra Information -->
    <fieldset>
        <legend>Extra information</legend>

        <label>Interests:</label>
        <input type="checkbox"> Books
        <input type="checkbox"> Movies
        <input type="checkbox"> Videogames
        <br><br>

        <label>Favorite color:</label>
        <input type="color">

    </fieldset>

    <!-- Buttons -->
    <div class="buttons">
        <input type="submit" value="Send data">
        <input type="reset" value="Reset form">
    </div>

</form>

</div>

</body>
</html>
