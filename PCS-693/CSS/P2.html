<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Shadow and Text Shadow</title>

    <style>
        /* Box Shadow */
        .box {
            width: 250px;
            height: 120px;
            margin: 50px;
            padding: 20px;
            background-color: lightpink;
            box-shadow: 10px 10px 8px gray;
            font-size: 20px;
        }

        /* Text Shadow */
        .text {
            font-size: 30px;
            color: black;
            text-shadow: 3px 3px 5px gray;
            margin-left: 50px;
        }
    </style>
</head>
<body>

    <div class="box">
        Box with Shadow
    </div>

    <p class="text">
        Text with Shadow
    </p>

</body>
</html>
