<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Image Position & Repeat</title>

  <style>
    body {
      margin: 0;
      padding: 0;

      /* Background image */
      background-image: url("https://media.istockphoto.com/id/1961324209/photo/a-concept-where-various-creative-thoughts-are-formed-within-a-light-bulb-3d-rendering.jpg?s=612x612&w=0&k=20&c=-Q38F3crdoLowPm5dAAYBy1loLmCvJp3m_bFZvSWTo8=");

      /* Position of image */
      background-position: top right;

      /* Repeat horizontally (use repeat-y for vertical) */
      background-repeat: repeat-x;

      /* Optional: makes image fixed or scroll with page */
      background-attachment: scroll;

      /* Optional: control size */
      background-size: 200px;
    }

    h1 {
      padding: 20px;
      color: white;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <h1>Background Image Positioned & Repeated Horizontally</h1>
</body>
</html>
