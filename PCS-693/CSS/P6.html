<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Background Image</title>

    <style>
        body {
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVG000cwzGCFBXF02V-M4MTFwIN_tywxdNDg&s");
            background-attachment: fixed;   
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            color: white;
            margin: 0;
            padding: 0;
        }

        .content {
            height: 2000px;   /* Extra height to enable scrolling */
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Fixed Background Image Example</h1>
        <p>
            This page demonstrates a fixed background image.
            When you scroll the page, the background image
            remains fixed and does not move with the content.
        </p>
    </div>

</body>
</html>
