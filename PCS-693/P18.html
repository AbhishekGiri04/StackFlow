<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrolling Status Bar</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .status-bar{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        .scrolling-text{
            display: inline-block;
            white-space: nowrap;
            animation: scrollText 10s linear infinite;
            
        }
        @keyframes scrollText {
            0%{
                transform: translateX(100%);

            }
            100%{
                transform: translateX(-100%);
                
            }
            
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="scrolling-text">Welcome to our website. This is a scrolling text message</span>
    </div>
</body>
</html>
